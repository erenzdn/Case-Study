server:
  port: 8000

spring:
  application:
    name: llm-discovery-system

  # System Database (stores metadata, classifications)
  datasource:
    url: jdbc:postgresql://${SYSTEM_DB_HOST:system_db}:${SYSTEM_DB_PORT:5432}/${SYSTEM_DB_NAME:system_database}
    username: ${SYSTEM_DB_USER:postgres}
    password: ${SYSTEM_DB_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Jackson — snake_case to match Python API contract (CLAUDE.md: camelCase for Java, but API outputs snake_case)
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL

# Authentication
auth:
  username: ${AUTH_USERNAME:admin}
  password: ${AUTH_PASSWORD:admin123}

# JWT
jwt:
  secret-key: ${JWT_SECRET_KEY:change-this-to-a-random-secret-key}
  algorithm: HS256
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

# OpenAI Compatible API
openai:
  api-key: ${OPENAI_API_KEY:your-openai-api-key-here}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  model: ${OPENAI_MODEL:gpt-4o-mini}

# Logging
logging:
  level:
    com.kafein.discovery: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} | %-5level | %-30logger{30} | %msg%n"

# SpringDoc / Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    display-request-duration: true
